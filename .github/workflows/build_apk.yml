name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Create Full Flutter Project Structure
      run: |
        flutter create . --org com.vizianet --project-name vizia_net --platforms=android
        mkdir -p lib
        echo "Replacing default main.dart with custom code"

    - name: Restore Custom Code
      run: |
        # Ensure our custom main.dart and pubspec.yaml remain active
        git checkout pubspec.yaml

    - name: Install Dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vizia-app-release
        path: build/app/outputs/flutter-apk/app-release.apk
